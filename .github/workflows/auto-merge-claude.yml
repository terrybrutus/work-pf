name: Auto-merge Claude branch
on:
  push:
    branches:
      - 'claude/**'
permissions:
  contents: write
  pull-requests: write
jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Open PR if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
          --base main \
          --head "${{ github.ref_name }}" \
          --title "Claude: ${{ github.ref_name }}" \
          --body "Auto-generated from Claude Code session." \
          --repo "${{ github.repository }}" \
          || true
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr view "${{ github.ref_name }}" \
          --repo "${{ github.repository }}" --json url -q .url)
          gh pr merge "$PR_URL" --auto --merge
